<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
    <style>
        .form {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 25px;
            width: fit-content;
            border: 4px solid var(--tram);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 10px;
             background: white;
             box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .form::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 0;
            /* transform: translateX(-50%); */
            width: 70px;
            height: 20px;
            background: var(--tram);
            clip-path: circle(50% at 50% 50%);
            animation: loop-on-line 2s forwards ;
            filter: blur(20px);
        }
        @keyframes loop-on-line {
            0% {
                transform: translateX(-50%) translateY(0);
            }
            20% {
                left : 100%;
                top : -15px;
                    transform: translateX(-50%) translateY(0) rotate(90deg);
            }
            40% {
                left : 100%;
                top : 100%;
                    transform: translateX(-50%) translateY(0) rotate(90deg);
            }
            60% {
                left : -15%;
                top : 100%;
                    transform: translateX(0%) translateY(-5px) rotate(180deg);
            }
            90% {
                top: -15px;
            left: 0;
                    transform: translateX(-50%) translateY(10px) rotate(270deg);
            }
            99% {
                transform: scale(8) translateX(0%) translateY(20%) rotate(360deg);
            }
            100%{
                display: none;
            }
        }
        .form div {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .form div i {
            font-size: 50px;
            color: var(--tram);
        }
        .form div input {
            padding: 5px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 5px;
            border: 4px solid var(--tram);
            text-align: center;
            font-size: 20px;
            color: var(--tram);
            outline: none;
        }
        .form button {
            padding: 10px 20px;
            background: var(--tram);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        .form button:hover {
           filter: brightness(90%);
        }
        #error-p {
            color: red ;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="form">
        <div>
            
            <i class="bi bi-shield-fill-check"></i>
            <input type="text" name="key" id="" placeholder="Your Key">
        </div>
        
        <div id="error-p"></div>
        <button type="button" onclick="login(document.querySelector('input').value)">Use Key</button>
    </div>
</body>
</html>
